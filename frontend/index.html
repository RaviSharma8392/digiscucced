<!DOCTYPE html>
<html lang="en-IN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- ═══════════════════════════════════════════════════════
         FALLBACK SEO — React Helmet overrides these at runtime.
         These are what Google sees on the FIRST raw HTML fetch
         before any JS executes (pre-render output replaces them).
    ═══════════════════════════════════════════════════════ -->
  <title>Affordable Website for Local Businesses in India | ₹500/mo | Etrynix</title>
  <meta name="description"
    content="Get a professional, fast, and mobile-friendly website for your local business in India starting at ₹500/month. Salons, clinics, gyms, retail shops. Grow your revenue with Etrynix." />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <link rel="canonical" href="https://etrynix.com" />

  <!-- Geo -->
  <meta name="geo.region" content="IN" />
  <meta name="geo.placename" content="India" />
  <meta name="language" content="en-IN" />

  <!-- Open Graph fallback -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Etrynix" />
  <meta property="og:title" content="Professional Websites for Indian Local Businesses | ₹500/mo | Etrynix" />
  <meta property="og:description"
    content="Digitize your local business with a high-conversion, mobile-first website. Starting at just ₹500/month." />
  <meta property="og:url" content="https://etrynix.com" />
  <meta property="og:image" content="https://etrynix.com/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt"
    content="Etrynix — Professional Websites for Indian Local Businesses starting at ₹500/month" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card fallback -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Professional Websites for Indian Local Businesses | ₹500/mo" />
  <meta name="twitter:description" content="Mobile-first websites for salons, clinics, gyms, retail — ₹500/month." />
  <meta name="twitter:image" content="https://etrynix.com/og-image.jpg" />

  <!-- ═══════════════════════════════════════════════════════
         PERFORMANCE
    ═══════════════════════════════════════════════════════ -->

  <!-- Preconnect to Google Fonts (if you use them) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Favicons — generate at https://favicon.io -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#f8fafc" />

  <!-- ═══════════════════════════════════════════════════════
         STRUCTURED DATA FALLBACK
         (vite-plugin-prerender will inline the runtime versions;
          this fires before React hydrates in non-prerendered envs)
    ═══════════════════════════════════════════════════════ -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "@id": "https://etrynix.com/#business",
      "name": "Etrynix",
      "url": "https://etrynix.com",
      "description": "Professional websites for local businesses in India starting at ₹500/month.",
      "priceRange": "₹₹",
      "areaServed": { "@type": "Country", "name": "India" },
      "image": "https://etrynix.com/og-image.jpg"
    }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
